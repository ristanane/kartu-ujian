<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Card Generator v5.1 - SDN Senden 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Ukuran Kartu Presisi 10 x 7 cm */
        .card-size {
            width: 100mm;
            height: 70mm;
            max-width: 100mm;
            max-height: 70mm;
        }

        /* Aturan Cetak Printer Portrait Mepet */
        @media print {
            body { background-color: #fff; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .page-break { page-break-after: always; display: grid !important; }
            
            @page { 
                size: portrait; 
                margin: 4mm 6mm 4mm 6mm; 
            }
            .card-container { box-shadow: none !important; }
        }

        .cutting-grid { gap: 4px; } 
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen pb-24">

    <div class="no-print max-w-5xl mx-auto bg-white border border-slate-200 rounded-2xl p-6 shadow-sm mb-8">
        
        <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-6">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-slate-900 text-white rounded-xl shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zm4.5 5a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1zM6 9.5a.5.5 0 0 0 .5-.5h3a.5.5 0 0 0 0 1h-3a.5.5 0 0 0-.5-.5m.5 2.5a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1zM4.5 4a.5.5 0 0 0 0 1h7a.5.5 0 0 0 0-1z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-950 tracking-tight">Smart Card Generator v5.1 (Fix Posisi Stempel)</h1>
                    <p class="text-xs text-slate-500">Foto digeser ke kiri nama Kepsek agar stempel basah menimpa pinggiran foto.</p>
                </div>
            </div>
        </div>

        <div class="mb-6 p-4 bg-slate-50 border border-slate-200 rounded-xl">
            <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider mb-3 flex items-center justify-between">
                <span>⚙️ Pengaturan Kop, Pejabat & Judul Kartu</span>
                <div class="flex gap-2">
                    <button onclick="resetSettings()" class="text-[10px] text-red-600 font-semibold bg-red-50 hover:bg-red-100 border border-red-200 px-2 py-0.5 rounded transition-all">✕ Reset Setelan</button>
                    <button onclick="saveSettings()" class="text-[10px] text-emerald-700 font-semibold bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-2 py-0.5 rounded transition-all">✔ Simpan Setelan</button>
                </div>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Nama Pemda / Yayasan</label>
                    <input type="text" id="setPemda" value="Pemerintah Kabupaten Magelang" class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Nama Instansi / Sekolah</label>
                    <input type="text" id="setSekolah" value="SD Negeri Senden 2" class="w-full p-2 border border-slate-300 rounded-lg text-xs font-bold focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Alamat Sekolah</label>
                    <input type="text" id="setAlamat" value="Kecamatan Mungkid, Kabupaten Magelang" class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-amber-600 mb-1">✍️ Judul Teks Kartu (Bisa Diedit)</label>
                    <input type="text" id="setJudulKartu" value="KARTU PESERTA UJIAN" class="w-full p-2 border border-amber-300 bg-amber-50 rounded-lg text-xs font-bold focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Nama Kepala Sekolah</label>
                    <input type="text" id="setKepsek" value="NAMA KEPALA SEKOLAH, S.Pd." class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">NIP Kepala Sekolah</label>
                    <input type="text" id="setNip" value="19850311XXXXXXXXXX" class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Nama File TTD Digital (di folder aset-sekolah)</label>
                    <input type="text" id="setTtdFile" placeholder="Contoh: ttd-kepsek.png" class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Nama File Logo (di folder aset-sekolah)</label>
                    <input type="text" id="setLogoFile" placeholder="Contoh: logo-sd.png" class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Nama File Watermark (di folder aset-sekolah)</label>
                    <input type="text" id="setWatermarkFile" placeholder="Contoh: tutwuri.png" class="w-full p-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:border-slate-950 bg-white">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Opsi Muat Foto Siswa</label>
                    <select id="setFotoOpt" class="w-full p-2 border border-slate-300 rounded-lg text-xs bg-white focus:outline-none focus:border-slate-950">
                        <option value="box">Kotak Kosong (Manual 3x4)</option>
                        <option value="digital_nisn">Otomatis Panggil Foto (via NISN.jpg)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Tema Warna Pinggiran</label>
                    <select id="setTema" class="w-full p-2 border border-slate-300 rounded-lg text-xs bg-white focus:outline-none focus:border-slate-950">
                        <option value="toska">Hijau Toska (Fresh)</option>
                        <option value="sky">Biru Langit (Calm)</option>
                        <option value="amber">Kuning Jingga (Energetic)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-500 mb-1">Kapasitas Lembar A4 (Mepet Tegak)</label>
                    <select id="setGrid" class="w-full p-2 border border-slate-300 rounded-lg text-xs bg-white focus:outline-none focus:border-slate-950">
                        <option value="8">8 Kartu (Sangat Hemat - 2 Kolom, 4 Baris)</option>
                        <option value="6">6 Kartu (Sedang - 2 Kolom, 3 Baris)</option>
                        <option value="4">4 Kartu (Longgar - 2 Kolom, 2 Baris)</option>
                    </select>
                </div>
            </div>

            <div class="mt-4 pt-3 border-t border-slate-200">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">👁️ Sembunyikan / Munculkan Komponen Kartu</label>
                <div class="flex flex-wrap gap-4 text-xs text-slate-700">
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="chkShowFoto" checked class="rounded border-slate-300"> Foto Siswa</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="chkShowTtd" checked class="rounded border-slate-300"> TTD & Stempel KS</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="chkShowNoPeserta" checked class="rounded border-slate-300"> Nomor Peserta</label>
                    <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="chkShowRuang" checked class="rounded border-slate-300"> Informasi Ruang</label>
                </div>
            </div>
        </div>

        <div class="mb-5">
            <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Langkah 1: Paste Baris Data dari Excel</label>
            <textarea id="excelInput" rows="4" class="w-full p-3 border border-slate-300 rounded-xl text-xs font-mono focus:outline-none focus:border-slate-950 bg-slate-50" placeholder="Nama	No Peserta	NISN	Tempat Lahir	Tanggal Lahir	Ruang&#10;ADITYA PUTRA PRATAMA	U-001	012345	Magelang	20-04-2014	Ruang 01&#10;SITI RAHMAWATI	U-002	012346	mAgELanG	2014/08/22	Ruang 02"></textarea>
            <button onclick="prosesExcel()" class="mt-2 bg-slate-900 hover:bg-slate-950 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-all shadow-sm">Muat Kolom Excel</button>
        </div>

        <div id="configSection" class="hidden mb-4 p-4 bg-slate-900 text-white rounded-xl border border-slate-800">
            <label class="block text-xs font-semibold text-amber-400 uppercase tracking-wider mb-3">Langkah 2: Centang Kolom Penyusun Data TTL</label>
            <div id="checkboxContainer" class="flex flex-wrap gap-3 text-xs text-slate-200 mb-4"></div>
            <button onclick="generateKartu()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-3 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 uppercase tracking-wider">
                Bikin & Susun Kartu Otomatis ✨
            </button>
        </div>

        <div id="filterSection" class="hidden p-4 bg-slate-100 border border-slate-200 rounded-xl grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2">
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">🔎 Cetak Kartu Susulan (Pencarian Individu)</label>
                <input type="text" id="txtSearch" oninput="jalankanFilterGlobal()" placeholder="Ketik Nama atau NISN siswa..." class="w-full bg-white text-xs p-2 border border-slate-300 rounded-lg focus:outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">🏫 Filter Kloter per Kelas / Ruang</label>
                <select id="selectFilterRuang" onchange="jalankanFilterGlobal()" class="w-full bg-white text-xs p-2 border border-slate-300 rounded-lg focus:outline-none">
                    <option value="ALL">Tampilkan Semua Data</option>
                </select>
            </div>
        </div>
    </div>

    <div id="printButtonContainer" class="no-print hidden flex justify-center mb-6">
        <button onclick="window.print()" class="bg-slate-900 hover:bg-slate-950 text-white font-bold px-6 py-3 rounded-xl shadow-md transition-all text-xs uppercase tracking-wider">
            Cetak Dokumen Sekarang (Mode Portrait)
        </button>
    </div>

    <div id="printArea" class="mx-auto flex flex-col items-center">
        </div>

    <script>
        let headers = [];
        let dataSiswa = [];

        window.onload = function() {
            if(localStorage.getItem('setPemda')) {
                document.getElementById('setPemda').value = localStorage.getItem('setPemda');
                document.getElementById('setSekolah').value = localStorage.getItem('setSekolah');
                document.getElementById('setAlamat').value = localStorage.getItem('setAlamat');
                document.getElementById('setJudulKartu').value = localStorage.getItem('setJudulKartu') || 'KARTU PESERTA UJIAN';
                document.getElementById('setKepsek').value = localStorage.getItem('setKepsek');
                document.getElementById('setNip').value = localStorage.getItem('setNip');
                document.getElementById('setTtdFile').value = localStorage.getItem('setTtdFile');
                document.getElementById('setLogoFile').value = localStorage.getItem('setLogoFile');
                document.getElementById('setWatermarkFile').value = localStorage.getItem('setWatermarkFile');
                document.getElementById('setFotoOpt').value = localStorage.getItem('setFotoOpt');
                document.getElementById('setTema').value = localStorage.getItem('setTema');
                document.getElementById('setGrid').value = localStorage.getItem('setGrid');
                document.getElementById('chkShowFoto').checked = localStorage.getItem('chkShowFoto') === 'true';
                document.getElementById('chkShowTtd').checked = localStorage.getItem('chkShowTtd') === 'true';
                document.getElementById('chkShowNoPeserta').checked = localStorage.getItem('chkShowNoPeserta') === 'true';
                document.getElementById('chkShowRuang').checked = localStorage.getItem('chkShowRuang') === 'true';
            }
        };

        function saveSettings() {
            localStorage.setItem('setPemda', document.getElementById('setPemda').value);
            localStorage.setItem('setSekolah', document.getElementById('setSekolah').value);
            localStorage.setItem('setAlamat', document.getElementById('setAlamat').value);
            localStorage.setItem('setJudulKartu', document.getElementById('setJudulKartu').value);
            localStorage.setItem('setKepsek', document.getElementById('setKepsek').value);
            localStorage.setItem('setNip', document.getElementById('setNip').value);
            localStorage.setItem('setTtdFile', document.getElementById('setTtdFile').value);
            localStorage.setItem('setLogoFile', document.getElementById('setLogoFile').value);
            localStorage.setItem('setWatermarkFile', document.getElementById('setWatermarkFile').value);
            localStorage.setItem('setFotoOpt', document.getElementById('setFotoOpt').value);
            localStorage.setItem('setTema', document.getElementById('setTema').value);
            localStorage.setItem('setGrid', document.getElementById('setGrid').value);
            localStorage.setItem('chkShowFoto', document.getElementById('chkShowFoto').checked);
            localStorage.setItem('chkShowTtd', document.getElementById('chkShowTtd').checked);
            localStorage.setItem('chkShowNoPeserta', document.getElementById('chkShowNoPeserta').checked);
            localStorage.setItem('chkShowRuang', document.getElementById('chkShowRuang').checked);
            alert('Pengaturan berhasil disimpan! ⭐');
        }

        function resetSettings() {
            if(confirm('Reset semua pengaturan?')) { localStorage.clear(); location.reload(); }
        }

        function prosesExcel() {
            const rawText = document.getElementById('excelInput').value.trim();
            if (!rawText) return alert('Silahkan paste kolom data dari Excel terlebih dahulu!');
            const rows = rawText.split('\n').map(row => row.split('\t'));
            headers = rows[0].map(h => h.trim());
            dataSiswa = [];
            let setRuangUnik = new Set();

            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length === headers.length) {
                    let siswa = {};
                    headers.forEach((header, index) => { siswa[header] = rows[i][index] ? rows[i][index].trim() : ''; });
                    dataSiswa.push(siswa);
                    let r = siswa['Ruang'] || siswa['RUANG'] || siswa['Kelas'] || '';
                    if(r) setRuangUnik.add(r);
                }
            }

            const selectFilter = document.getElementById('selectFilterRuang');
            selectFilter.innerHTML = '<option value="ALL">Tampilkan Semua Data</option>';
            setRuangUnik.forEach(ruang => { selectFilter.innerHTML += `<option value="${ruang.toLowerCase()}">${ruang}</option>`; });

            const container = document.getElementById('checkboxContainer');
            container.innerHTML = '';
            headers.forEach(header => {
                const isChecked = header.toLowerCase().includes('lahir') ? 'checked' : '';
                container.innerHTML += `
                    <label class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-lg text-white text-xs cursor-pointer">
                        <input type="checkbox" name="kolomGabung" value="${header}" ${isChecked} class="rounded text-amber-400">
                        <span>${header}</span>
                    </label>
                `;
            });
            document.getElementById('configSection').classList.remove('hidden');
        }

        function formatTanggalIndo(text) {
            if (!text) return '';
            const match = text.match(/(\d{1,4})[\/\-.](\d{1,2})[\/\-.](\d{1,4})/);
            if (!match) return text;
            let d, m, y;
            if (match[1].length === 4) { y = match[1]; m = parseInt(match[2]); d = match[3]; }
            else { d = match[1]; m = parseInt(match[2]); y = match[3]; }
            const bulanIndo = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            if (m >= 1 && m <= 12) return `${parseInt(d)} ${bulanIndo[m]} ${y}`;
            return text;
        }

        function toTitleCase(str) {
            if (!str) return '';
            return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        }

        function generateKartu() {
            const txtPemda = document.getElementById('setPemda').value;
            const txtSekolah = document.getElementById('setSekolah').value;
            const txtAlamat = document.getElementById('setAlamat').value;
            const txtJudulKartu = document.getElementById('setJudulKartu').value.toUpperCase();
            const txtKepsek = document.getElementById('setKepsek').value;
            const txtNip = document.getElementById('setNip').value;
            const txtTtdFile = document.getElementById('setTtdFile').value;
            const txtLogoFile = document.getElementById('setLogoFile').value;
            const txtWatermarkFile = document.getElementById('setWatermarkFile').value;
            const optFoto = document.getElementById('setFotoOpt').value;
            const tema = document.getElementById('setTema').value;
            const limitGrid = parseInt(document.getElementById('setGrid').value);

            const showFoto = document.getElementById('chkShowFoto').checked;
            const showTtd = document.getElementById('chkShowTtd').checked;
            const showNoPeserta = document.getElementById('chkShowNoPeserta').checked;
            const showRuang = document.getElementById('chkShowRuang').checked;

            const checkboxes = document.querySelectorAll('input[name="kolomGabung"]:checked');
            const kolomDipilih = Array.from(checkboxes).map(cb => cb.value);

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';

            let colorSchema = { border: 'border-teal-400', badge: 'bg-teal-50 text-teal-800 border-teal-200', textRuang: 'text-teal-700' };
            if (tema === 'sky') colorSchema = { border: 'border-sky-400', badge: 'bg-sky-50 text-sky-800 border-sky-200', textRuang: 'text-sky-700' };
            if (tema === 'amber') colorSchema = { border: 'border-amber-400', badge: 'bg-amber-50 text-amber-800 border-amber-200', textRuang: 'text-amber-700' };

            let currentPageHTML = '';
            let cardsInPage = 0;

            dataSiswa.forEach((siswa, index) => {
                let gabunganTTL = kolomDipilih.map(kolom => {
                    let isi = siswa[kolom] || '';
                    if (kolom.toLowerCase().includes('tempat')) return toTitleCase(isi);
                    return formatTanggalIndo(isi);
                }).filter(val => val !== '').join(', ');

                let namaSiswa = toTitleCase(siswa['Nama'] || siswa['NAMA'] || Object.values(siswa)[0]);
                let nisnSiswa = siswa['NISN'] || siswa['Nisn'] || siswa['NIS'] || '-';
                let ruangSiswa = siswa['Ruang'] || siswa['RUANG'] || siswa['Kelas'] || '-';
                let noPeserta = siswa['No Peserta'] || siswa['NO PESERTA'] || siswa['Nomor'] || '-';

                let nameFontSize = namaSiswa.length > 22 ? 'text-[10px] font-bold leading-tight' : 'text-[12px] font-bold';

                let logoHTML = `<div class="w-9 h-9 bg-slate-900 text-white rounded-lg flex items-center justify-center text-[9px] font-black shrink-0">SDN</div>`;
                if (txtLogoFile.trim() !== '') logoHTML = `<img src="aset-sekolah/${txtLogoFile}" class="w-9 h-9 object-contain shrink-0">`;

                let watermarkHTML = '';
                if (txtWatermarkFile.trim() !== '') watermarkHTML = `<img src="aset-sekolah/${txtWatermarkFile}" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-24 h-24 object-contain opacity-[0.05] pointer-events-none">`;

                let fotoHTML = '';
                if (showFoto) {
                    if (optFoto === 'digital_nisn' && nisnSiswa !== '-') {
                        fotoHTML = `<img src="foto-siswa/${nisnSiswa}.jpg" onerror="this.onerror=null; this.src='https://via.placeholder.com/120x140?text=3x4'" class="w-12 h-15 border border-slate-300 object-cover rounded shadow-sm bg-white mr-2">`;
                    } else {
                        fotoHTML = `<div class="w-12 h-15 border border-slate-300 bg-slate-50 flex items-center justify-center rounded text-[8px] text-slate-400 font-bold mr-2">Foto 3x4</div>`;
                    }
                }

                let ttdImgHTML = '';
                if (showTtd && txtTtdFile.trim() !== '') {
                    // TTD diposisikan overlapping di kiri teks Kepala Sekolah (mengarah ke tengah-tengah arah foto)
                    ttdImgHTML = `<img src="aset-sekolah/${txtTtdFile}" class="absolute -top-5 -left-4 h-10 object-contain mix-blend-multiply z-20">`;
                }

                // TEMPLATE PORTRAIT KARTU PRESISI 10 X 7 CM
                const kartuHTML = `
                    <div data-identity="${namaSiswa.toLowerCase()} ${nisnSiswa}" data-ruang="${ruangSiswa.toLowerCase()}" class="card-element card-size bg-white border-2 ${colorSchema.border} rounded-xl p-3 shadow-sm flex flex-col justify-between relative overflow-hidden card-container">
                        ${watermarkHTML}
                        
                        <div class="flex items-center gap-2 border-b-2 border-slate-800 pb-1 relative z-10">
                            ${logoHTML}
                            <div class="text-center flex-grow">
                                <h3 class="text-[7.5px] font-bold uppercase tracking-wider text-slate-500 leading-none">${txtPemda}</h3>
                                <h2 class="text-[12px] font-black uppercase text-slate-900 leading-tight mt-0.5 tracking-tight">${txtSekolah}</h2>
                                <p class="text-[7px] text-slate-400 font-medium leading-none mt-0.5 truncate max-w-[240px] mx-auto">${txtAlamat}</p>
                            </div>
                            <div id="qr_${index}" class="w-8 h-8 bg-white p-0.5 border border-slate-200 rounded shrink-0 flex items-center justify-center"></div>
                        </div>

                        <div class="text-center my-0.5 relative z-10">
                            <span class="${colorSchema.badge} text-[9px] font-black px-4 py-0.5 rounded-full uppercase tracking-widest border block truncate max-w-[240px] mx-auto">${txtJudulKartu}</span>
                        </div>

                        <div class="grid grid-cols-12 gap-x-1 gap-y-0.5 text-[9.5px] font-bold text-slate-700 flex-grow px-1 mt-0.5 relative z-10">
                            ${showNoPeserta ? `
                                <div class="col-span-3 text-slate-400 font-medium">No. Peserta</div>
                                <div class="col-span-9 font-mono text-red-600">: ${noPeserta}</div>
                            ` : ''}

                            <div class="col-span-3 text-slate-400 font-medium">Nama</div>
                            <div class="col-span-9 text-slate-900 truncate">: ${namaSiswa}</div>

                            <div class="col-span-3 text-slate-400 font-medium">NISN</div>
                            <div class="col-span-9 text-slate-900">: ${nisnSiswa}</div>

                            <div class="col-span-3 text-slate-400 font-medium">TTL</div>
                            <div class="col-span-9 text-slate-900 truncate">: ${gabunganTTL}</div>

                            ${showRuang ? `
                                <div class="col-span-3 text-slate-400 font-medium">Ruang</div>
                                <div class="col-span-9 ${colorSchema.textRuang}">: ${ruangSiswa}</div>
                            ` : ''}
                        </div>

                        <div class="flex justify-end items-end mt-0.5 pt-1 border-t border-slate-100 relative z-10">
                            
                            ${fotoHTML}
                            
                            <div class="text-left text-[8px] text-slate-800 w-[115px] shrink-0 relative">
                                <p class="text-[6.5px] text-slate-400 leading-none">Kepala Sekolah,</p>
                                <div class="h-6 relative mt-0.5">
                                    ${ttdImgHTML}
                                </div>
                                <p class="font-extrabold underline leading-none truncate">${toTitleCase(txtKepsek)}</p>
                                <p class="text-[6.5px] text-slate-400 mt-0.5">NIP. ${txtNip}</p>
                            </div>

                        </div>
                    </div>
                `;

                if (cardsInPage === 0) {
                    currentPageHTML = `<div class="page-container page-break relative grid grid-cols-2 cutting-grid bg-white border border-slate-200 shadow-sm mb-6 rounded-xl w-[210mm] justify-items-center content-center py-2">`;
                }

                currentPageHTML += kartuHTML;
                cardsInPage++;

                if (cardsInPage === limitGrid || index === dataSiswa.length - 1) {
                    currentPageHTML += `</div>`;
                    printArea.innerHTML += currentPageHTML;
                    cardsInPage = 0;
                }
            });

            // GENERATE QR CODE
            dataSiswa.forEach((siswa, index) => {
                let nisnSiswa = siswa['NISN'] || siswa['Nisn'] || siswa['NIS'] || '000000';
                let namaSiswa = siswa['Nama'] || siswa['NAMA'] || 'Siswa';
                let r = siswa['Ruang'] || siswa['RUANG'] || 'Ruang';
                let qrContainer = document.getElementById(`qr_${index}`);
                if (qrContainer) {
                    new QRCode(qrContainer, {
                        text: `SDN 2 Senden - ${namaSiswa} - ${nisnSiswa} - ${r}`,
                        width: 28,
                        height: 28,
                        colorDark : "#0f172a",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                }
            });

            document.getElementById('filterSection').classList.remove('hidden');
            document.getElementById('printButtonContainer').classList.remove('hidden');
        }

        function jalankanFilterGlobal() {
            const searchQuery = document.getElementById('txtSearch').value.toLowerCase().trim();
            const ruangQuery = document.getElementById('selectFilterRuang').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card-element');

            cards.forEach(card => {
                const identity = card.getAttribute('data-identity');
                const ruang = card.getAttribute('data-ruang');
                const matchSearch = identity.includes(searchQuery);
                const matchRuang = (ruangQuery === 'all' || ruang === ruangQuery);

                if (matchSearch && matchRuang) {
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                } else {
                    card.style.opacity = '0.08';
                    card.style.pointerEvents = 'none';
                }
            });
        }
    </script>
</body>
</html>
